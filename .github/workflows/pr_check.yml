name: PR Check (stable PYME)

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ninja-build

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          # Pre-install build deps so --no-build-isolation works for PYME and
          # pymecompress (both have compiled Cython/meson extensions).
          pip install meson-python meson cython numpy

      - name: Install pymecompress
        run: |
          # Must use --no-build-isolation so the build sees numpy already installed.
          pip install --no-build-isolation pymecompress

      - name: Install python-microscopy (stable PyPI release)
        run: |
          pip install --no-build-isolation python-microscopy

      - name: Install double-helix
        run: |
          # --no-deps avoids pip downloading PYME again
          pip install --no-deps .

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest -v tests/ --cov=double_helix --cov-report=xml
        env:
          GITHUB_CI: "1"

