name: PR Check (dev PYME)

on:
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ninja-build

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          # Pre-install build deps so --no-build-isolation works for PYME and
          # pymecompress (both have compiled Cython/meson extensions).
          pip install meson-python meson cython numpy

      - name: Install pymecompress
        run: |
          pip install --no-build-isolation pymecompress

      - name: Clone python-microscopy (git HEAD)
        run: |
          git clone --depth=1 https://github.com/python-microscopy/python-microscopy.git /tmp/pyme-src

      - name: Install python-microscopy dependencies (excluding wxpython)
        run: |
          # Mirror PYME's own CI: read deps from its pyproject.toml and skip
          # wxpython (no display in CI) and pymecompress (already installed).
          python - <<'EOF'
          import tomllib, subprocess, sys
          with open('/tmp/pyme-src/pyproject.toml', 'rb') as f:
              deps = tomllib.load(f)['project']['dependencies']
          skip = {'wxpython', 'pymecompress'}
          deps = [d for d in deps if not any(d.lower().startswith(s) for s in skip)]
          subprocess.check_call([sys.executable, '-m', 'pip', 'install'] + deps)
          EOF

      - name: Install python-microscopy (git HEAD)
        run: |
          pip install --no-build-isolation --no-deps /tmp/pyme-src

      - name: Install double-helix
        run: |
          pip install --no-deps .

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest -v tests/ --cov=double_helix --cov-report=xml
        env:
          GITHUB_CI: "1"
