name: Publish to PyPI

on:
  release:
    types: [published]
  workflow_dispatch:
    inputs:
      tag:
        description: 'Git tag to build and publish (e.g. v26.03.03)'
        required: true
        type: string

permissions:
  contents: read

jobs:
  release-build:
    runs-on: ubuntu-latest

    steps:
      - name: Determine release tag
        id: release_tag
        shell: bash
        run: echo "tag=${{ inputs.tag || github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"

      - name: Validate tag format
        shell: bash
        run: |
          if [[ ! "${{ steps.release_tag.outputs.tag }}" =~ ^[0-9]{2}\.[0-9]{2}\.[0-9]{2}$ ]]; then
            echo "Invalid release tag '${{ steps.release_tag.outputs.tag }}'. Expected format: XX.XX.XX"
            exit 1
          fi

      - uses: actions/checkout@v4
        with:
          ref: refs/tags/${{ steps.release_tag.outputs.tag }}
          fetch-depth: 0  # Required: setuptools-scm reads the version from git tags

      - uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Build release distributions
        run: |
          python -m pip install build
          python -m build

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: release-dists
          path: dist/

  pypi-publish:
    runs-on: ubuntu-latest
    needs:
      - release-build
    permissions:
      # IMPORTANT: mandatory for OIDC trusted publishing
      id-token: write

    # Dedicated environment with protection rules
    environment:
      name: pypi
      url: https://pypi.org/project/pyme-double-helix/${{ inputs.tag || github.event.release.tag_name }}

    steps:
      - name: Retrieve release distributions
        uses: actions/download-artifact@v4
        with:
          name: release-dists
          path: dist/

      - name: Publish release distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
