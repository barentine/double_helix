name: Tests

on:
  schedule:
    - cron: '0 7 * * 1'  # Every Monday at 07:00 UTC
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.11']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
          cache-dependency-path: 'pyproject.toml'

      - name: Install system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y ninja-build

      - name: Install build dependencies
        run: |
          python -m pip install --upgrade pip
          pip install meson-python meson cython numpy

      - name: Install runtime dependencies (excluding wxpython)
        run: |
          # pymecompress must be built with --no-build-isolation to see the already-installed numpy.
          pip install --no-build-isolation pymecompress
          # Install PYME without wxpython (no display available in CI)
          pip install --no-build-isolation --no-deps python-microscopy
          # Read PYME's declared dependencies from its installed metadata; skip
          # wxpython (requires a display) and pymecompress (already installed).
          python - <<'EOF'
          import importlib.metadata, subprocess, sys, re
          skip = {'wxpython', 'pymecompress'}
          deps = []
          for req in (importlib.metadata.requires('python-microscopy') or []):
              if '; extra ==' in req.lower():
                  continue  # skip optional extras
              name = re.split(r'[><=!;\[ ]', req.strip())[0].lower()
              if not any(name.startswith(s) for s in skip):
                  deps.append(req.strip())
          if deps:
              subprocess.check_call([sys.executable, '-m', 'pip', 'install'] + deps)
          EOF

      - name: Install double-helix
        run: |
          pip install --no-deps .

      - name: Install test dependencies
        run: |
          pip install pytest pytest-cov

      - name: Run tests
        run: |
          pytest -v tests/ --cov=double_helix --cov-report=xml
        env:
          GITHUB_CI: "1"
